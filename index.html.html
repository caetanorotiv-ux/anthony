<title>Convite - José Anthony 3 Anos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a1628; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
  .invite {
    width: 480px;
    background: linear-gradient(175deg, #0d2251 0%, #1a3a8f 40%, #0d2251 100%);
    border-radius: 28px;
    overflow: hidden;
    position: relative;
    font-family: 'Nunito', sans-serif;
    border: 3px solid #f5c518;
    box-shadow: 0 0 0 6px rgba(245,197,24,0.15), 0 20px 60px rgba(0,0,0,0.6);
  }
  .stars { position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:0; overflow:hidden; }
  .star-dot { position:absolute; width:3px; height:3px; background:white; border-radius:50%; opacity:0.3; animation:twinkle 2s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:0.15} 50%{opacity:0.6} }
  .top-stripe {
    background: linear-gradient(90deg, #c8102e 0%, #e63946 50%, #c8102e 100%);
    padding: 12px 20px 10px; text-align:center; position:relative; z-index:2;
    border-bottom: 3px solid #f5c518;
  }
  .top-stripe-text { font-family:'Fredoka One',sans-serif; font-size:12px; letter-spacing:3px; color:#fff; text-transform:uppercase; }
  .paw-line { display:flex; justify-content:center; gap:6px; margin-bottom:5px; }
  .paw-line span { font-size:16px; animation:bpaw 1.4s ease-in-out infinite; }
  .paw-line span:nth-child(2){animation-delay:.2s}
  .paw-line span:nth-child(3){animation-delay:.4s}
  .paw-line span:nth-child(4){animation-delay:.6s}
  @keyframes bpaw{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .chars-row { display:flex; justify-content:space-around; align-items:flex-end; padding:14px 10px 0; position:relative; z-index:2; }
  .photo-section { display:flex; justify-content:center; padding:6px 0 10px; position:relative; z-index:2; }
  .photo-outer { position:relative; width:170px; height:170px; }
  .photo-ring { width:170px; height:170px; border-radius:50%; padding:5px; background:conic-gradient(#f5c518,#e63946,#1a3a8f,#f5c518,#e63946,#f5c518); animation:spin-ring 8s linear infinite; }
  @keyframes spin-ring{to{transform:rotate(360deg)}}
  .photo-inner { width:100%; height:100%; border-radius:50%; overflow:hidden; border:4px solid #0d2251; }
  .photo-inner img { width:100%; height:100%; object-fit:cover; object-position:center 5%; }
  .age-star { position:absolute; top:-4px; right:-12px; width:54px; height:54px; z-index:3; }
  .name-block { text-align:center; padding:10px 20px 4px; position:relative; z-index:2; }
  .invite-label { font-size:11px; font-weight:800; letter-spacing:2.5px; color:#f5c518; text-transform:uppercase; margin-bottom:4px; }
  .name-big { font-family:'Fredoka One',sans-serif; font-size:38px; color:#fff; line-height:1; text-shadow:2px 3px 0 #c8102e,4px 5px 0 rgba(0,0,0,0.3); }
  .anos-chip { display:inline-flex; align-items:center; gap:6px; background:#e63946; color:#fff; font-family:'Fredoka One',sans-serif; font-size:15px; padding:5px 18px; border-radius:22px; margin-top:8px; border:2px solid #f5c518; }
  .div-row { display:flex; align-items:center; gap:8px; padding:12px 28px 6px; position:relative; z-index:2; }
  .div-line { flex:1; height:1.5px; background:rgba(245,197,24,0.4); border-radius:2px; }
  .info-section { padding:2px 20px 0; display:flex; flex-direction:column; gap:9px; position:relative; z-index:2; }
  .icard { background:rgba(255,255,255,0.07); border:1.5px solid rgba(245,197,24,0.3); border-radius:14px; padding:11px 16px; display:flex; align-items:center; gap:12px; }
  .icard-icon { font-size:24px; flex-shrink:0; }
  .icard-label { font-size:10px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:#f5c518; margin-bottom:2px; }
  .icard-val { font-family:'Fredoka One',sans-serif; font-size:17px; color:#fff; line-height:1.2; }
  .icard-sub { font-size:11px; color:rgba(255,255,255,0.55); margin-top:2px; }
  .bottom-bar { margin-top:18px; background:linear-gradient(90deg,#c8102e,#e63946,#c8102e); border-top:3px solid #f5c518; padding:11px 20px; text-align:center; position:relative; z-index:2; }
  .bottom-txt { font-family:'Fredoka One',sans-serif; font-size:14px; color:#fff; text-shadow:1px 1px 0 rgba(0,0,0,0.3); }
  .bottom-paws { margin-top:5px; font-size:13px; letter-spacing:3px; opacity:0.75; }
</style>
